name: CI/CD Pipeline - ENI Fianarantsoa

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # JOB 1 : Tests automatiques
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Installer les dépendances
        run: npm install

      - name: Lancer les tests
        run: npm test

  # JOB 2 : Construction de l'image Docker
  build:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Construire l'image Docker
        run: docker build -t mon-app-devops:latest .

      - name: Vérifier l'image créée
        run: docker images

  # JOB 3 : Déploiement
  deploy:
    name: 🚀 Déploiement
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Simuler le déploiement
        run: |
          echo "✅ Tests passés !"
          echo "✅ Image Docker construite !"
          echo "🚀 Déploiement en cours..."
          echo "🎉 Application déployée avec succès !"

