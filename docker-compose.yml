services:
  # Service 1 : Application Node.js
  app:
    build: .
    container_name: mon-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: always
    networks:
      - mon-reseau

  # Service 2 : Nginx
  nginx:
    image: nginx:alpine
    container_name: mon-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    restart: always
    networks:
      - mon-reseau

  # Service 3 : Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: mon-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - app
    restart: always
    networks:
      - mon-reseau

  # Service 4 : Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: mon-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    depends_on:
      - prometheus
    restart: always
    networks:
      - mon-reseau

networks:
  mon-reseau:
    driver: bridge
