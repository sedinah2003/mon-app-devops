

services:
  # Service 1 : Notre application Node.js
  app:
    build: .
    container_name: mon-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: always
    networks:
      - mon-reseau

  # Service 2 : Nginx comme proxy
  nginx:
    image: nginx:alpine
    container_name: mon-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    restart: always
    networks:
      - mon-reseau

networks:
  mon-reseau:
    driver: bridge
